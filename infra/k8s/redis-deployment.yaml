apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-mcp
  namespace: mcp
spec:
  selector:
    matchLabels:
      app: redis-mcp
  template:
    metadata:
      labels:
        app: redis-mcp
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
